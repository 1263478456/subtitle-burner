# git-cliff 配置 · 双语 / Conventional Commits
# 文档：https://git-cliff.org/docs/configuration

[changelog]
# 模板变量：{{ version }} {{ commit_id }} {{ commits }} ...
header = """
# Changelog · 更新日志\n
> 本项目的所有显著变更都会记录在此文件。\
  基于 [Conventional Commits](https://www.conventionalcommits.org/) 规范自动生成。\n
"""

body = """
{% if version -%}
## [{{ version }}] · {{ timestamp | date(format="%Y-%m-%d") }}
{% else -%}
## Unreleased · 未发布
{% endif -%}
{% for group, commits in commits | filter(attribute="merge_commit", value=false) | group_by(attribute="group") %}
### {{ group | upper_first }}
{% for commit in commits | sort(attribute="message") -%}
- {{ commit.message | split(pat="\n") | first | upper_first | trim_end }}\
  {% if commit.breaking %} **(BREAKING)**{% endif %} \
  ([{{ commit.id | truncate(length=7, end="") }}]({{ commit.id }}))
{% endfor %}
{% for commit in commits | filter(attribute="breaking") -%}
{% if commit.breaking -%}
> ⚠ **Breaking change**: {{ commit.breaking_message | upper_first }}
{% endif -%}
{% endfor -%}
{% endfor %}\n
"""

footer = """
---
*Generated by [git-cliff](https://git-cliff.org/) · 由 git-cliff 自动生成*
"""

trim = true
postprocessors = []

[git]
conventional_commits = true
filter_unconventional = false
split_commits = false
protect_breaking_commits = true
filter_commits = false
tag_pattern = "v[0-9]*"
topo_order = false
sort_commits = "oldest"

[commit_parsers]
# === 核心分组 · 按 Conventional Commits type 聚合 ===

# 🚀 Features / 新功能
{ message = "^feat", group = "🚀 Features · 新功能" }

# 🐛 Fixes / 缺陷修复
{ message = "^fix",  group = "🐛 Bug Fixes · 缺陷修复" }

# 📚 Documentation / 文档
{ message = "^docs", group = "📚 Documentation · 文档" }

# 🎨 Styling / 样式（不影响逻辑）
{ message = "^style", group = "🎨 Styling · 样式" }

# ♻ Refactor / 重构（既不是 feat 也不是 fix）
{ message = "^refactor", group = "♻ Refactor · 重构" }

# ⚡ Performance / 性能优化
{ message = "^perf", group = "⚡ Performance · 性能优化" }

# 🧪 Tests / 测试
{ message = "^test", group = "🧪 Tests · 测试" }

# 🔧 Build / 构建系统与依赖
{ message = "^build", group = "🔧 Build · 构建" }

# 🤖 CI / 持续集成
{ message = "^ci",   group = "🤖 CI · 持续集成" }

# ⏪ Revert / 回滚
{ message = "^revert", group = "⏪ Revert · 回滚" }

# 🚀 chore(scope): 仅当 chore 不被 feat/fix 拦截时，归到杂项
{ message = "^chore", group = "🧹 Chore · 杂项" }

# 任何不匹配上述规则的提交，单独成组
{ message = ".*", group = "💼 Other · 其他", scope = "other" }

# 跳过 merge commit
{ message = "^Merge", skip = true }
{ message = "^merge", skip = true }

[link]
# 自动把 commit id 渲染为 GitHub 链接
{{ commit.id }} = "https://github.com/1263478456/subtitle-burner/commit/{{ commit.id }}"
{{ commit.id | truncate(length=7, end="") }} = "https://github.com/1263478456/subtitle-burner/commit/{{ commit.id }}"

# 自动把 version 渲染为 GitHub release/tag 对比链接
{{ version }} = "https://github.com/1263478456/subtitle-burner/compare/v{{ previous.version }}...v{{ version }}"

[bump]
features_always_bump_minor = true
breaking_always_bump_major = true
initial_tag = "0.1.0"