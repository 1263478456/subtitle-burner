name: auto-version-bump

on:
  push:
    branches:
      - main
    tags-ignore:
      - 'v*'

permissions:
  contents: write

jobs:
  bump:
    if: "!contains(github.event.head_commit.message, 'chore:')"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true
          token: ${{ secrets.GH_PAT }}

      - name: Determine next tag
        id: tag
        run: |
          VERSION=$(python -c "import re; print(re.search(r'__version__ = \"(.*?)\"', open('app/__init__.py').read()).group(1))")
          MAJOR=$(echo $VERSION | sed 's/v//;s/\.[0-9]*\.[0-9]*$//')
          MINOR=$(echo $VERSION | sed 's/v[0-9]*\.//;s/\.[0-9]*$//')
          PATCH=$(echo $VERSION | sed 's/.*\.//')

          NEXT_PATCH=$((PATCH + 1))
          NEXT="v${MAJOR}.${MINOR}.${NEXT_PATCH}"

          echo "current=$VERSION" >> $GITHUB_OUTPUT
          echo "next=$NEXT" >> $GITHUB_OUTPUT
          echo "bumping $VERSION -> $NEXT"

      - name: Update version file
        run: |
          echo "__version__ = \"${{ steps.tag.outputs.next }}\"" > app/__init__.py

      - name: Commit and tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add app/__init__.py
          git commit -m "chore: bump version to ${{ steps.tag.outputs.next }}"
          git tag "${{ steps.tag.outputs.next }}"
          git push origin main --tags
