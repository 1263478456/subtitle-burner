name: docker-publish

on:
  push:
    tags: ['v*.*.*']
    paths:
      - 'README.md'
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  DOCKERHUB_REPOSITORY: 1263478456/subtitle-burner
  GHCR_REPOSITORY: ghcr.io/1263478456/subtitle-burner

jobs:
  update-description:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: peter-evans/dockerhub-description@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
          repository: ${{ env.DOCKERHUB_REPOSITORY }}
          readme-filepath: ./README.md

  meta:
    runs-on: ubuntu-latest
    outputs:
      tags: ${{ steps.meta.outputs.tags }}
      labels: ${{ steps.meta.outputs.labels }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true
      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ${{ env.DOCKERHUB_REPOSITORY }}
            ${{ env.GHCR_REPOSITORY }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=semver,pattern={{version}}
            type=sha,format=short,prefix=sha-

  build:
    needs: meta
    strategy:
      fail-fast: false
      matrix:
        include:
          - variant: cpu
            platform: linux/amd64
            dockerfile: app/Dockerfile.cpu
            suffix: amd64
          - variant: cpu
            platform: linux/arm64
            dockerfile: app/Dockerfile.cpu
            suffix: arm64
          - variant: gpu
            platform: linux/amd64
            dockerfile: app/Dockerfile.gpu
            suffix: gpu

    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Append architecture suffix to tags
        id: tags
        env:
          RAW_TAGS: ${{ needs.meta.outputs.tags }}
          SUFFIX: ${{ matrix.suffix }}
        run: |
          result=""
          while IFS= read -r tag; do
            [ -z "$tag" ] && continue
            result="${result}${tag}-${SUFFIX}"$'\n'
          done <<< "$RAW_TAGS"
          echo "tags<<EOF" >> "$GITHUB_OUTPUT"
          printf '%s' "$result" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          platforms: ${{ matrix.platform }}
          push: true
          tags: ${{ steps.tags.outputs.tags }}
          labels: ${{ needs.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.variant }}-${{ matrix.platform }}
          cache-to: type=gha,scope=${{ matrix.variant }}-${{ matrix.platform }},mode=max

  merge:
    needs: [meta, build]
    runs-on: ubuntu-latest
    steps:
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create multi-arch manifests
        env:
          RAW_TAGS: ${{ needs.meta.outputs.tags }}
          DH: ${{ env.DOCKERHUB_REPOSITORY }}
          GHC: ${{ env.GHCR_REPOSITORY }}
        run: |
          while IFS= read -r tag; do
            [ -z "$tag" ] && continue
            short_tag="${tag#*:}"
            echo "merge: $DH:$short_tag"
            docker buildx imagetools create -t "$DH:$short_tag" \
              "$DH:${short_tag}-amd64" "$DH:${short_tag}-arm64" || true
            docker buildx imagetools create -t "$GHC:$short_tag" \
              "$GHC:${short_tag}-amd64" "$GHC:${short_tag}-arm64" || true
          done <<< "$RAW_TAGS"
          echo "merge done"
