# =============================================================================
# Subtitle Burner · GitHub Release
# =============================================================================
# Triggered automatically when a tag like v2.2.0 is pushed, or manually from
# the Actions tab. Generates a Release Notes body, links to the freshly built
# Docker images, and publishes a GitHub Release (draft or published).
#
# Required Secrets
# ----------------
#   GITHUB_TOKEN   auto-provided, used by softprops/action-gh-release
# =============================================================================

name: GitHub Release

on:
  push:
    tags: ['v*.*.*']
  workflow_dispatch:
    inputs:
      tag:
        description: 'Existing tag to release (e.g. v2.2.0). Defaults to the latest semver tag if empty.'
        required: false
        default: ''
      draft:
        description: 'Create as draft release (won''t notify watchers)?'
        type: choice
        default: 'true'
        options:
          - 'true'
          - 'false'

permissions:
  contents: write   # required to create the release
  packages: write

jobs:

  # ---------------------------------------------------------------------------
  # 1. resolve — pick the right tag (manual input or the tag that fired push).
  # ---------------------------------------------------------------------------
  resolve:
    name: Resolve tag
    runs-on: ubuntu-latest
    outputs:
      tag:        ${{ steps.pick.outputs.tag }}
      version:    ${{ steps.pick.outputs.version }}
      is_draft:   ${{ steps.pick.outputs.is_draft }}
      dockerhub:  ${{ steps.pick.outputs.dockerhub }}
    steps:
      - name: Checkout
        uses: actions/checkout@6929e7d00a01e2ce44069b5fd2a4e8c83b8e2c47  # v4.1.7
        with:
          fetch-depth: 0   # need full history for changelog

      - name: Pick tag
        id: pick
        env:
          EVENT_NAME:  ${{ github.event_name }}
          REF_NAME:    ${{ github.ref_name }}
          MANUAL_TAG:  ${{ github.event.inputs.tag }}
          MANUAL_DRAFT: ${{ github.event.inputs.draft }}
        run: |
          set -euo pipefail

          TAG=""
          IS_DRAFT="false"

          if [[ "$EVENT_NAME" == "workflow_dispatch" ]]; then
            if [[ -n "$MANUAL_TAG" ]]; then
              TAG="$MANUAL_TAG"
            else
              TAG="$(git tag --sort=-version:refname | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | head -n1 || true)"
            fi
            IS_DRAFT="${MANUAL_DRAFT:-true}"
          else
            # tag push event
            TAG="$REF_NAME"
            IS_DRAFT="true"   # default to draft on tag push; flip manually if happy
          fi

          if [[ -z "$TAG" ]]; then
            echo "::error::No tag could be resolved."
            exit 1
          fi

          # Strip the leading v for nicer display.
          VERSION="${TAG#v}"

          echo "tag=$TAG"          >> "$GITHUB_OUTPUT"
          echo "version=$VERSION"  >> "$GITHUB_OUTPUT"
          echo "is_draft=$IS_DRAFT" >> "$GITHUB_OUTPUT"
          echo "dockerhub=${{ secrets.DOCKERHUB_USERNAME || 'YOUR_DOCKERHUB_USER' }}" >> "$GITHUB_OUTPUT"

  # ---------------------------------------------------------------------------
  # 2. release — assemble Release Notes & publish.
  # ---------------------------------------------------------------------------
  release:
    name: Build release notes
    needs: resolve
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@6929e7d00a01e2ce44069b5fd2a4e8c83b8e2c47  # v4.1.7
        with:
          fetch-depth: 0
          ref: ${{ needs.resolve.outputs.tag }}

      - name: Generate changelog (Conventional Commits)
        id: changelog
        uses: orhun/git-cliff-action@4c8d37a6674b8c4f1e6f5d5e6e4a6c0a0e6a0e6a  # v3
        with:
          tag: ${{ needs.resolve.outputs.tag }}
          args: --strip header --tag-pattern v[0-9]+\.[0-9]+\.[0-9]+ | head -c 60000
        env:
          OUTPUT: ./CHANGELOG_FRAGMENT.md

      - name: Compose release body
        id: body
        env:
          TAG:        ${{ needs.resolve.outputs.tag }}
          VERSION:    ${{ needs.resolve.outputs.version }}
          DOCKERHUB:  ${{ needs.resolve.outputs.dockerhub }}
        run: |
          set -euo pipefail
          CL=""
          if [[ -f CHANGELOG_FRAGMENT.md ]]; then
            CL="$(cat CHANGELOG_FRAGMENT.md)"
          fi

          # Author summary (cheap stat; good enough for a release body).
          AUTHOR_COUNT="$(git log "$(git describe --tags --abbrev=0 "${TAG}^" 2>/dev/null || git rev-list --max-parents=0 HEAD | head -n1)".."${TAG}" --pretty='%an' 2>/dev/null | sort -u | wc -l | tr -d ' ')"
          COMMIT_COUNT="$(git rev-list --count "$(git describe --tags --abbrev=0 "${TAG}^" 2>/dev/null || git rev-list --max-parents=0 HEAD | head -n1)".."${TAG}" 2>/dev/null || echo "?")"

          cat > RELEASE_BODY.md <<EOF
          ## ${TAG} — $(date -u +'%Y-%m-%d')

          ${CL}

          ---

          ### Docker images

          \`\`\`bash
          # CPU image (recommended for general use)
          docker pull ${DOCKERHUB}/subtitle-burner:${VERSION}-cpu
          docker pull ${DOCKERHUB}/subtitle-burner:latest

          # GPU image (NVIDIA NVENC hardware encoder)
          docker pull ${DOCKERHUB}/subtitle-burner-gpu:${VERSION}-gpu
          \`\`\`

          ### Quick start

          \`\`\`bash
          docker run --rm -p 8000:8000 ${DOCKERHUB}/subtitle-burner:latest \\
              -v \$(pwd)/jobs:/jobs \\
              -e JOBS_DIR=/jobs

          # Then POST a job:
          curl -X POST http://localhost:8000/burn \\
              -H 'Content-Type: application/json' \\
              -d '{
                "video_url":   "https://example.com/clip.mp4",
                "subtitle_url":"https://example.com/clip.ass",
                "output_name": "burned.mp4"
              }'
          \`\`\`

          ---

          _Generated from ${COMMIT_COUNT} commits by ${AUTHOR_COUNT} contributors._
          EOF

          echo "body_file=RELEASE_BODY.md" >> "$GITHUB_OUTPUT"
          echo "---- release body preview (first 30 lines) ----"
          head -n 30 RELEASE_BODY.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@15393bb1aa9b56737b952d1b1e46904e4f6e3a5d  # v2.0.5
        with:
          tag_name: ${{ needs.resolve.outputs.tag }}
          name:     ${{ needs.resolve.outputs.tag }}
          draft:    ${{ needs.resolve.outputs.is_draft == 'true' }}
          prerelease: ${{ contains(needs.resolve.outputs.tag, '-') }}
          generate_release_notes: false
          body_path: RELEASE_BODY.md
          fail_on_unmatched_files: false
          files: |
            CHANGELOG_FRAGMENT.md