services:
  cleaner:
    command:
      - '-c'
      - >
        echo "0 3 * * * find /data/input -type f -mtime +7 -delete && find
        /data/output -type f -mtime +30 -name '*压制完成*' -delete" | crontab -
        crond -f -L /dev/stdout
    container_name: subtitle-burner-cleaner
    entrypoint: /bin/sh
    image: alpine
    restart: unless-stopped
    volumes:
      - /mnt/vol1/aria2/subtitle/data:/data

  subtitle-burner:
    container_name: subtitle-burner
    deploy:
      resources:
        reservations:
          devices:
            - capabilities:
                - gpu
              count: 1
              driver: nvidia
    environment:
      - TZ=Asia/Shanghai
      # 从 .env 文件读取敏感配置
      - ADMIN_USERNAME=${ADMIN_USERNAME}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD}
      - SESSION_SECRET=${SESSION_SECRET}
      - MAX_FILE_SIZE_MB=204800
      - MAX_CONCURRENT_TASKS=4
      - MEDIA_ROOT=/media
      - LOG_LEVEL=INFO
      - LOG_ACCESS=false
      - FFMPEG_TIMEOUT=7200
      - PROGRESS_STALL_TIMEOUT=600
    image: ghcr.io/1263478456/subtitle-burner:latest-gpu
    ports:
      - '3214:8000'
    restart: unless-stopped
    user: '950:950'
    volumes:
      - /mnt/vol1/aria2/subtitle/data/input:/data/input
      - /mnt/vol1/aria2/subtitle/data/output:/data/output
      - /mnt/vol1/aria2/subtitle/data/fonts:/usr/share/fonts/custom:ro
      - /mnt/vol1/aria2/subtitle/data/db:/data/db
      - /mnt/vol1/aria2/subtitle/media:/media:ro
