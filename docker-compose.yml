services:
  cleaner:
    command:
      - '-c'
      - >
        echo "0 3 * * * find /data/input -type f -mtime +7 -delete && find
        /data/output -type f -mtime +30 -name '*压制完成*' -delete" | crontab -
        crond -f -L /dev/stdout
    container_name: subtitle-burner-cleaner
    entrypoint: /bin/sh
    image: alpine
    restart: unless-stopped
    volumes:
      - /mnt/vol1/aria2/subtitle/data:/data

  subtitle-burner:
    container_name: subtitle-burner
    deploy:
      resources:
        reservations:
          devices:
            - capabilities:
                - gpu
              count: 1
              driver: nvidia
    environment:
      - TZ=Asia/Shanghai
      - ADMIN_USERNAME=1263478456
      - ADMIN_PASSWORD=Lyb123789
      - SESSION_SECRET=a8f3k2j9d7h5g4c6b1n0m3p8q2w7e5r9
      - MAX_FILE_SIZE_MB=204800
      - MAX_CONCURRENT_TASKS=4
      - MEDIA_ROOT=/media
      # 日志配置
      - LOG_LEVEL=INFO           # 日志级别: DEBUG/INFO/WARNING/ERROR
      - LOG_ACCESS=false         # 关闭 HTTP 请求日志（轮询噪音）
      # FFmpeg 超时配置
      - FFMPEG_TIMEOUT=7200      # FFmpeg 总体超时（秒），默认 2 小时
      - PROGRESS_STALL_TIMEOUT=600  # 进度卡住超时（秒），默认 10 分钟
    image: 1263478456/subtitle-burner:latest-gpu
    ports:
      - '3214:8000'
    restart: unless-stopped
    user: '950:950'
    volumes:
      - /mnt/vol1/aria2/subtitle/data/input:/data/input
      - /mnt/vol1/aria2/subtitle/data/output:/data/output
      - /mnt/vol1/aria2/subtitle/data/fonts:/usr/share/fonts/custom:ro
      - /mnt/vol1/aria2/subtitle/data/db:/data/db
      - /mnt/vol1/aria2/subtitle/media:/media:ro
